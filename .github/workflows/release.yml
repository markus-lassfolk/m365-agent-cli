# Publish to npm and create a GitHub Release when a version tag is pushed.
# Tag pattern v*.*.* matches semver (v1.2.3) and calendar-style versions (e.g. v2026.4.50).
# Preferred: Trusted Publishing (OIDC) — configure npm: Package → Trusted publishers → GitHub Actions → this repo + release.yml
# Optional: add repository secret NPM_TOKEN (granular publish token) if OIDC publish still fails; the publish step uses it when set.
# See: https://docs.npmjs.com/trusted-publishers
# Tag must match package.json version exactly (e.g. tag v2026.4.50 and "version": "2026.4.50").

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Git tag v$TAG does not match package.json version $VER. Bump version, commit, then tag the same commit."
            exit 1
          fi
          echo "Releasing version $VER"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      # Do not set registry-url here: it injects NODE_AUTH_TOKEN from OIDC and overrides NPM_TOKEN in the publish step.
      # Trusted Publishing (OIDC-only, no NPM_TOKEN) needs Node ≥22.14 and npm ≥11.5.1 per npm docs.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Ensure npm CLI for Trusted Publishing / publish
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Embed git SHA (GlitchTip / release parity)
        run: node scripts/embed-git-sha.mjs

      - name: Typecheck
        run: bun run typecheck

      - name: Biome (lint + format + assist)
        run: bun run biome:check

      - name: Tests + coverage floor
        env:
          COVERAGE_MIN_LINES: '32'
        run: |
          bun run test:coverage
          test -f coverage/lcov.info || (echo '::error::coverage/lcov.info missing after bun test --coverage' && exit 1)
          bun run verify:coverage

      - name: Knip
        run: bun run knip

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          npm config set registry https://registry.npmjs.org/
          if [ -n "$NPM_TOKEN" ]; then
            echo "Publishing with repository secret NPM_TOKEN (no --provenance: that path requires OIDC-only auth)."
            # Trim accidental newlines from the secret; literal token in user npmrc.
            NPM_TOKEN="$(printf '%s' "$NPM_TOKEN" | tr -d '\r\n')"
            unset NODE_AUTH_TOKEN || true
            rm -f .npmrc
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
            npm publish --access public
          else
            echo "Publishing with Trusted Publishing (OIDC) + provenance."
            npm publish --access public --provenance
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Prepends user-facing notes; GitHub appends auto-generated contributor/commits summary after.
          body_path: CHANGELOG.md
          files: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
