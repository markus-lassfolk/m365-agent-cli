# Publish to npm (Trusted Publishing / OIDC — no NPM_TOKEN) and create a GitHub Release on tag v*.*.*.
# Configure the package on npmjs.com: Package → Access → Trusted publishers → link this repo + workflow.
# See: https://docs.npmjs.com/trusted-publishers
# Tag must match package.json version (e.g. tag v1.2.3 and "version": "1.2.3").

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Git tag v$TAG does not match package.json version $VER. Bump version, commit, then tag the same commit."
            exit 1
          fi
          echo "Releasing version $VER"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Embed git SHA (GlitchTip / release parity)
        run: node scripts/embed-git-sha.mjs

      - name: Typecheck
        run: bun run typecheck

      - name: Biome (lint + format + assist)
        run: bun run biome:check

      - name: Tests + coverage floor
        env:
          COVERAGE_MIN_LINES: '35'
        run: |
          bun run test:coverage
          test -f coverage/lcov.info || (echo '::error::coverage/lcov.info missing after bun test --coverage' && exit 1)
          bun run verify:coverage

      - name: Knip
        run: bun run knip

      - name: Publish to npm (OIDC + provenance)
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
