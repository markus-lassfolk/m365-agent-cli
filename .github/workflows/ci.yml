name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly run to catch new vulnerabilities

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Runs on every PR targeting main and on every push to main. A failing step blocks merge
  # (when branch protection requires this workflow) and blocks direct pushes to main.
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Biome (lint + format + assist)
        run: bun run biome:check

      - name: Graph path inventory (drift check)
        run: bun run graph:inventory:check

      # Fails if docs/GRAPH_PERMISSION_FEATURE_MATRIX.md ≠ generated output from GRAPH_CAPABILITY_MATRIX (exit 1).
      - name: Graph permission feature matrix (drift check — blocks merge if stale)
        run: bun run docs:graph-permission-matrix:check

      # Bun/Linux vs Windows can shift global line totals in lcov; scripts/check-coverage.mjs notes the same drift.
      # Lib-scoped gate: target 80% (see plan). CI uses a ramp — M1=45%, M2→60%, M3→80%. Script default remains 80 when env unset.
      - name: Tests + coverage floor
        env:
          # Denominator excludes `src/commands/` (large handler surface; lib + tests are the merge gate).
          COVERAGE_EXCLUDE_PREFIXES: 'src/commands/'
          COVERAGE_MIN_LINES: '50'
          # Roadmap M2: raised from 45 after test expansion (2026-05). Next target 60% (LIB_COVERAGE_ROADMAP_TO_60.md).
          COVERAGE_MIN_LINES_LIB: '50'
        run: |
          bun run test:coverage
          test -f coverage/lcov.info || (echo '::error::coverage/lcov.info missing after bun test --coverage' && exit 1)
          bun run verify:coverage
          bun run verify:coverage:lib
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            echo '### Lib coverage gaps (top 20, exclude ews)' >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            node scripts/report-lib-coverage-gaps.mjs --top 20 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Knip (unused files, deps, exports)
        run: bun run knip

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  security:
    name: Security & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy (filesystem, HIGH+CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  coverage-pr:
    name: PR coverage comment
    needs: [quality]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Report coverage on PR
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
